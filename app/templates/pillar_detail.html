{% extends "base.html" %}
{% block title %}{{ pillar.title }} - NAIRA{% endblock %}
{% block content %}
<section class="py-32 relative overflow-hidden">
    <div class="container mx-auto px-6 relative z-10">
        <div class="max-w-4xl mx-auto">
            <nav class="flex mb-8" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li class="inline-flex items-center">
                        <a href="/pillars" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">Pillars</a>
                    </li>
                    <li>
                        <div class="flex items-center">
                            <i data-feather="chevron-right" class="w-4 h-4 text-black/40 mx-2"></i>
                            <span class="text-sm font-medium text-black/60">{{ pillar.title }}</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <div class="flex items-center gap-6 mb-8">
                <div class="w-16 h-16 rounded-2xl bg-{{ pillar.color }}-600/20 border border-{{ pillar.color }}-500/30 flex items-center justify-center">
                    <i data-feather="{{ pillar.icon }}" class="w-8 h-8 text-{{ pillar.color }}-600"></i>
                </div>
                <div>
                    <span class="text-{{ pillar.color }}-600 font-display font-bold text-lg opacity-50">{{ pillar.number }}</span>
                    <h2 class="text-3xl md:text-4xl font-display font-bold text-indigo-600">{{ pillar.title }}</h2>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-8 md:p-12 border border-black/10">
                <div class="text-black text-lg leading-relaxed text-justify whitespace-pre-line">
                    {{ pillar.description }}
                </div>
            </div>

            <div class="mt-12 text-center">
                <a href="/pillars" class="inline-flex items-center gap-2 px-8 py-3 bg-indigo-600 text-white rounded-full font-medium hover:bg-indigo-700 transition-colors">
                    <i data-feather="arrow-left" class="w-4 h-4"></i>
                    Back to Pillars
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
