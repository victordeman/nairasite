<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NAIRA - African AI & XR Excellence Hub{% endblock %}</title>
    <meta name="description" content="NAIRA transforms education and innovation through AI and XR technologies, embedding African knowledge systems into global tech solutions.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Feather Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        naira: {
                            primary: '#4f46e5',
                            secondary: '#f59e0b',
                            dark: '#0f172a',
                            darker: '#020617',
                            accent: '#10b981',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-indigo-500 selection:text-white overflow-x-hidden">
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300">
        <div class="container mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <a href="/" class="font-display text-2xl font-bold bg-gradient-to-r from-indigo-400 to-amber-400 bg-clip-text text-transparent">
                    NAIRA
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/' %}text-white font-bold{% endif %}">Home</a>
                    <a href="/vision" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/vision' %}text-white font-bold{% endif %}">Vision</a>
                    <a href="/pillars" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/pillars' %}text-white font-bold{% endif %}">Pillars</a>
                    <a href="/architecture" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/architecture' %}text-white font-bold{% endif %}">Architecture</a>
                    <a href="/revenue" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/revenue' %}text-white font-bold{% endif %}">Revenue</a>
                    <a href="/content" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/content' %}text-white font-bold{% endif %}">Content</a>
                    <a href="/projects" class="text-sm text-slate-300 hover:text-white transition-colors {% if request.url.path == '/projects' %}text-white font-bold{% endif %}">Projects</a>
                    <a href="/contact" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full text-sm font-medium transition-all">Contact Us</a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden text-slate-300 hover:text-white">
                    <i data-feather="menu" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="mobile-menu" class="hidden md:hidden pb-6">
                <div class="flex flex-col gap-4">
                    <a href="/" class="text-slate-300 hover:text-white transition-colors">Home</a>
                    <a href="/vision" class="text-slate-300 hover:text-white transition-colors">Vision</a>
                    <a href="/pillars" class="text-slate-300 hover:text-white transition-colors">Pillars</a>
                    <a href="/architecture" class="text-slate-300 hover:text-white transition-colors">Architecture</a>
                    <a href="/revenue" class="text-slate-300 hover:text-white transition-colors">Revenue</a>
                    <a href="/content" class="text-slate-300 hover:text-white transition-colors">Content</a>
                    <a href="/projects" class="text-slate-300 hover:text-white transition-colors">Projects</a>
                    <a href="/contact" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full text-sm font-medium transition-all text-center">Contact Us</a>
                </div>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-white/5 py-12">
        <div class="container mx-auto px-6">
            <div class="grid md:grid-cols-3 gap-8 items-center">
                <div>
                    <a href="/" class="font-display text-2xl font-bold bg-gradient-to-r from-indigo-400 to-amber-400 bg-clip-text text-transparent">NAIRA</a>
                    <p class="text-slate-500 text-sm mt-2">NBU AI Research & Advancement Institute</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-sm">&copy; 2025 NAIRA. All rights reserved.</p>
                </div>
                <div class="flex gap-4 justify-end">
                    <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors">
                        <i data-feather="twitter" class="w-4 h-4 text-slate-400"></i>
                    </a>
                    <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors">
                        <i data-feather="linkedin" class="w-4 h-4 text-slate-400"></i>
                    </a>
                    <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors">
                        <i data-feather="github" class="w-4 h-4 text-slate-400"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>
    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
