{% extends "base.html" %}
{% block title %}Login - NAIRA{% endblock %}

{% block content %}
<div class="min-h-screen pt-32 pb-20 px-6">
    <div class="container mx-auto">
        <div class="max-w-md mx-auto">
            <div class="glass-card rounded-3xl p-8 border border-white/10 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 rounded-2xl bg-indigo-600/10 flex items-center justify-center mx-auto mb-4">
                        <i data-feather="lock" class="w-8 h-8 text-indigo-600"></i>
                    </div>
                    <h1 class="text-3xl font-display font-bold text-slate-900 dark:text-white">Sign In</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-2">Access your NAIRA dashboard</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Username</label>
                        <input type="text" name="username" required class="w-full bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                        <input type="password" name="password" required class="w-full bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500 transition-colors">
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-[0.98] mt-4">
                        Sign In
                    </button>
                </form>

                <div id="login-status" class="mt-6 hidden"></div>

                <p class="text-center text-slate-500 text-sm mt-8">
                    Don't have an account? <a href="/register" class="text-indigo-600 font-bold hover:underline">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const status = document.getElementById('login-status');

    try {
        const response = await fetch('/auth/token', {
            method: 'POST',
            body: formData, // OAuth2PasswordRequestForm expects form data
        });

        const result = await response.json();
        status.classList.remove('hidden');
        if (response.ok) {
            localStorage.setItem('access_token', result.access_token);
            status.className = 'text-center py-3 px-4 rounded-xl bg-emerald-600/20 text-emerald-400 border border-emerald-500/30';
            status.textContent = 'Login successful! Redirecting...';
            setTimeout(() => window.location.href = '/agent', 1000);
        } else {
            status.className = 'text-center py-3 px-4 rounded-xl bg-red-600/20 text-red-400 border border-red-500/30';
            status.textContent = result.detail || 'Login failed';
        }
    } catch (error) {
        status.classList.remove('hidden');
        status.className = 'text-center py-3 px-4 rounded-xl bg-red-600/20 text-red-400 border border-red-500/30';
        status.textContent = 'Network error. Please try again.';
    }
});
</script>
{% endblock %}
