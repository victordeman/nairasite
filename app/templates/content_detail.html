{% extends "base.html" %}
{% block title %}{{ item.title }} - Content Model - NAIRA{% endblock %}
{% block content %}
<section class="py-32 relative overflow-hidden">
    <div class="container mx-auto px-6 relative z-10">
        <div class="max-w-4xl mx-auto">
            <nav class="flex mb-8" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li class="inline-flex items-center">
                        <a href="/content" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">
                            <i data-feather="map" class="w-4 h-4 mr-2 inline"></i>
                            Content Model
                        </a>
                    </li>
                    <li>
                        <div class="flex items-center">
                            <i data-feather="chevron-right" class="w-4 h-4 text-black/40 mx-2"></i>
                            <span class="text-sm font-medium text-black/60">{{ item.title }}</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <div class="flex items-center gap-6 mb-8">
                <div class="w-16 h-16 rounded-2xl bg-{{ item.color }}-600/20 border border-{{ item.color }}-500/30 flex items-center justify-center">
                    <i data-feather="{{ item.icon }}" class="w-8 h-8 text-{{ item.color }}-600"></i>
                </div>
                <div>
                    <h2 class="text-3xl md:text-4xl font-display font-bold text-indigo-600">{{ item.title }}</h2>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-8 md:p-12 border border-black/10 bg-white">
                <div class="text-black text-lg leading-relaxed text-justify space-y-6 whitespace-pre-line">
                    {{ item.description }}
                </div>

                <div class="mt-12 pt-12 border-t border-black/5 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center">
                            <i data-feather="share-2" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Share Content</p>
                            <div class="flex gap-3 mt-1">
                                <a href="#" class="text-slate-600 hover:text-indigo-600"><i data-feather="twitter" class="w-4 h-4"></i></a>
                                <a href="#" class="text-slate-600 hover:text-indigo-600"><i data-feather="linkedin" class="w-4 h-4"></i></a>
                                <a href="#" class="text-slate-600 hover:text-indigo-600"><i data-feather="link" class="w-4 h-4"></i></a>
                            </div>
                        </div>
                    </div>
                    <a href="/contact" class="px-8 py-3 bg-indigo-600 text-white rounded-full font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/20 flex items-center gap-2">
                        Get Involved
                        <i data-feather="arrow-right" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>

            <div class="mt-12 text-center">
                <a href="/content" class="inline-flex items-center gap-2 px-8 py-3 bg-white text-indigo-600 border border-indigo-600 rounded-full font-medium hover:bg-indigo-50 transition-colors">
                    <i data-feather="arrow-left" class="w-4 h-4"></i>
                    Back to Content Model
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
