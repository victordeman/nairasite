{% extends "base.html" %}
{% block title %}Profile - NAIRA{% endblock %}

{% block content %}
<div class="min-h-screen pt-32 pb-20 px-6 bg-slate-50 dark:bg-slate-950">
    <div class="container mx-auto">
        <div class="max-w-4xl mx-auto">
            <div class="glass-card rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                <!-- Profile Header -->
                <div class="bg-indigo-600 h-32 relative">
                    <div class="absolute -bottom-12 left-8">
                        <div class="w-24 h-24 rounded-2xl bg-white dark:bg-slate-900 p-1 shadow-xl">
                            <div class="w-full h-full rounded-xl bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold text-3xl" id="profile-initials">
                                ..
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-16 pb-8 px-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 class="text-3xl font-display font-bold text-slate-900 dark:text-white" id="profile-fullname">Loading...</h1>
                            <p class="text-indigo-600 font-medium" id="profile-username">@loading</p>
                        </div>
                        <div class="flex gap-3">
                            <button class="px-6 py-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-medium hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">Edit Profile</button>
                            <button onclick="logout()" class="px-6 py-2 bg-red-600/10 text-red-600 rounded-xl font-medium hover:bg-red-600/20 transition-colors">Logout</button>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-3 gap-6 mt-12">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-white/50 dark:bg-white/5 rounded-2xl p-6 border border-slate-200 dark:border-white/5">
                                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Account Information</h3>
                                <div class="grid gap-4">
                                    <div>
                                        <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Email Address</p>
                                        <p class="text-slate-700 dark:text-slate-300 font-medium" id="profile-email">loading@naira.institute</p>
                                    </div>
                                    <div>
                                        <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Account Role</p>
                                        <div class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 dark:bg-indigo-900/30 dark:text-indigo-400" id="profile-role">
                                            User
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white/50 dark:bg-white/5 rounded-2xl p-6 border border-slate-200 dark:border-white/5 text-center">
                                <div class="w-12 h-12 rounded-xl bg-indigo-600/10 flex items-center justify-center mx-auto mb-4">
                                    <i data-feather="shield" class="w-6 h-6 text-indigo-600"></i>
                                </div>
                                <h4 class="font-bold text-slate-900 dark:text-white">Account Status</h4>
                                <p class="text-slate-500 text-sm mt-1" id="profile-status">Verified Member</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadProfile() {
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    // In a real app, you'd fetch user data from an endpoint like /api/me
    // Since we don't have a specific /me endpoint, we'll use a hack or implement one.
    // Let's implement /api/me in api.py
    try {
        const response = await fetch('/api/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
            return;
        }

        const user = await response.json();
        document.getElementById('profile-fullname').textContent = user.full_name || user.username;
        document.getElementById('profile-username').textContent = `@${user.username}`;
        document.getElementById('profile-email').textContent = user.email;
        document.getElementById('profile-role').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
        document.getElementById('profile-initials').textContent = user.username.substring(0, 2).toUpperCase();

        if (window.feather) feather.replace();
    } catch (error) {
        console.error('Failed to load profile:', error);
    }
}

function logout() {
    localStorage.removeItem('access_token');
    window.location.href = '/login';
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
{% endblock %}
