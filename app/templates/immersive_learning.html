{% extends "base.html" %}
{% block title %}Immersive Experiential Learning - NAIRA{% endblock %}
{% block content %}
<section class="py-32 relative bg-slate-950 min-h-screen overflow-hidden">
    <!-- Cinematic Background Elements -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute top-1/2 -right-48 w-[500px] h-[500px] bg-amber-600/5 rounded-full blur-[150px]"></div>
        <div class="film-grain opacity-10"></div>
    </div>

    <div class="container mx-auto px-6 relative z-10">
        <div class="text-center max-w-3xl mx-auto mb-20">
            <span class="text-indigo-400 font-medium tracking-[0.3em] uppercase text-xs">Immersive Media Gallery</span>
            <h2 class="font-display text-4xl md:text-6xl font-bold mt-4 mb-6 text-white leading-tight">African Heritage <br/><span class="text-indigo-500">Comes Alive</span></h2>
            <p class="text-slate-400 text-lg md:text-xl">Step inside the history and spirit of Africa through cinematic XR storytelling.</p>
        </div>

        <div class="grid grid-cols-1 gap-16">
            <!-- IKS: The Orality Lab -->
            <div id="orality-lab" class="mt-20">
                <div id="orality-lab-root"></div>
            </div>
        </div>
    </div>
</section>

<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
</script>

<!-- React and Framer Motion CDNs -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>

<script src="/static/js/knowledge_bank.js"></script>
<script type="text/babel" src="/static/js/orality_lab.js"></script>
{% endblock %}
