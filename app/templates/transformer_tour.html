{% extends "base.html" %}
{% block title %}Transformer 3D Tour - NAIRA{% endblock %}
{% block content %}
<div id="transformer-tour-container" class="w-full h-screen bg-[#050a18] relative">
    <div id="transformer-canvas-container" class="w-full h-full absolute inset-0 z-0"></div>
    

    <div class="absolute top-6 left-6 pointer-events-none z-10">
        <h1 class="text-sm font-bold tracking-widest text-purple-400 uppercase">Transformer 3D Tour</h1>
        <h2 id="arch-name" class="text-2xl font-bold text-white">Original Transformer (2017)</h2>
    </div>

    <div id="info-panel" class="hidden fixed top-20 right-6 w-[420px] bg-[#0a0f1a] border border-slate-800/40 rounded-[32px] shadow-[0_24px_64px_rgba(0,0,0,0.6)] overflow-hidden z-50">
        <!-- Dynamic Header -->
        <div id="panel-header" class="px-8 py-6 flex items-center justify-between border-b transition-all duration-700">
            <div class="flex items-center gap-4">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full transition-all duration-700"></div>
                <div>
                    <h2 id="comp-name-en" class="text-white font-bold text-xl tracking-tight leading-none mb-1.5"></h2>
                    <p id="comp-name-ig" class="text-slate-400 text-xs font-semibold uppercase tracking-wider opacity-80"></p>
                </div>
            </div>
            <button id="close-info" class="text-slate-500 hover:text-white transition-all hover:rotate-90 duration-300 p-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="p-8 space-y-10">
            <!-- English Section -->
            <div class="space-y-4">
                <div class="flex items-center gap-2.5 text-[#38bdf8] text-[11px] font-black tracking-[0.2em] uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    ENGLISH
                </div>
                <p id="comp-desc-en" class="text-white leading-relaxed text-[16px] font-medium tracking-wide"></p>
            </div>
        </div>

        <!-- Drill Down Button -->
        <div class="px-8 pb-8">
            <button id="drill-down-btn" class="w-full transition-all text-white font-bold py-5 rounded-[24px] flex items-center justify-center gap-3 shadow-2xl active:scale-[0.97] border tracking-wide">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                Drill Down — See Internals
            </button>
        </div>
    </div>

    <div class="absolute bottom-6 left-6 text-[10px] text-slate-500 uppercase tracking-widest z-10">
        Click blocks to explore · Drag to rotate · Scroll to zoom
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const DATA = [
        // Encoder Stack
        { id: 'enc-input-embedding', stack: 'encoder', name: 'Input Embedding', nameIgbo: 'Mtinyere Ihe Ntinye', description: 'Converts input tokens into dense vectors of d_model dimensions.', descriptionIgbo: 'Ọ na-atụgharị mkpụrụokwu ntinye ka ọ bụrụ vectors dị arọ nke akụkụ d_model.', position: [-4, -6, 0], color: 0x6366f1, textColor: 'white' },
        { id: 'enc-pos-encoding', stack: 'encoder', name: 'Positional Encoding', nameIgbo: 'Ntinye Ọnọdụ', description: 'Adds information about the relative or absolute position of the tokens.', descriptionIgbo: 'Na-agbakwunye ozi gbasara ọnọdụ ikwu ma ọ bụ zuru oke nke akara ndị ahụ.', position: [-4, -4.5, 0], color: 0xff9f1c, textColor: 'dark' },
        { id: 'enc-mha', stack: 'encoder', name: 'Multi-Head Self-Attention', nameIgbo: 'Nleba anya nwere ọtụtụ isi', description: 'Allows the model to jointly attend to information from different representation subspaces.', descriptionIgbo: 'Na-enye ohere ka ihe nlereanya ahụ lekọta ozi sitere na subspaces nnọchite anya dịiche iche.', position: [-4, -2.5, 0], color: 0x00b4ff, textColor: 'white' },
        { id: 'enc-add-norm-1', stack: 'encoder', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Residual connection followed by layer normalization.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [-4, -1, 0], color: 0x78909c, textColor: 'white' },
        { id: 'enc-ffn', stack: 'encoder', name: 'Feed-Forward Network', nameIgbo: 'Nye n\'ihu', description: 'Point-wise fully connected layers applied to each position identically.', descriptionIgbo: 'Ihe mkpuchi ejikọtara nke ọma na-emetụta ọnọdụ ọ bụla n\'otu aka ahụ.', position: [-4, 1, 0], color: 0x00e676, textColor: 'white' },
        { id: 'enc-add-norm-2', stack: 'encoder', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Residual connection followed by layer normalization.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [-4, 2.5, 0], color: 0x78909c, textColor: 'white' },

        // Decoder Stack
        { id: 'dec-output-embedding', stack: 'decoder', name: 'Output Embedding', nameIgbo: 'Mtinyere Ihe Mpụta', description: 'Converts target tokens into dense vectors for the decoder.', descriptionIgbo: 'Ọ na-atụgharị mkpụrụokwu ezubere iche ka ọ bụrụ vectors maka decoder.', position: [4, -6, 0], color: 0x6366f1, textColor: 'white' },
        { id: 'dec-pos-encoding', stack: 'decoder', name: 'Positional Encoding', nameIgbo: 'Ntinye Ọnọdụ', description: 'Adds positional information to the target embeddings.', descriptionIgbo: 'Na-agbakwunye ozi gbasara ọnọdụ ikwu ma ọ bụ zuru oke nke akara ndị ahụ.', position: [4, -4.5, 0], color: 0xff9f1c, textColor: 'dark' },
        { id: 'dec-masked-mha', stack: 'decoder', name: 'Masked Multi-Head Self-Attention', nameIgbo: 'Nlebara anya nwere ọtụtụ isi ekpuchiri ekpuchiri', description: 'Prevents positions from attending to subsequent positions.', descriptionIgbo: 'Na-eme ka ihe nlereanya ahụ lekwasị anya na ọnọdụ ndị gara aga iji nọgide na causality.', position: [4, -2.5, 0], color: 0x00b4ff, textColor: 'white' },
        { id: 'dec-add-norm-1', stack: 'decoder', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Residual connection and normalization after masked attention.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [4, -1, 0], color: 0x78909c, textColor: 'white' },
        { id: 'dec-cross-attn', stack: 'decoder', name: 'Cross-Attention', nameIgbo: 'Nlebara anya gafere', description: 'Allows the decoder to attend to the encoder output.', descriptionIgbo: 'Na-enye ohere ka decoder leba anya na mmepụta encoder.', position: [4, 1, 0], color: 0x00f5ff, textColor: 'white' },
        { id: 'dec-add-norm-2', stack: 'decoder', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Residual connection and normalization after cross-attention.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [4, 2.5, 0], color: 0x78909c, textColor: 'white' },
        { id: 'dec-ffn', stack: 'decoder', name: 'Feed-Forward Network', nameIgbo: 'Nye n\'ihu', description: 'Point-wise fully connected layers in the decoder stack.', descriptionIgbo: 'Ihe mkpuchi ejikọtara nke ọma na-emetụta ọnọdụ ọ bụla n\'otu aka ahụ.', position: [4, 4.5, 0], color: 0x00e676, textColor: 'white' },
        { id: 'dec-add-norm-3', stack: 'decoder', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Final residual connection and normalization.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [4, 6, 0], color: 0x78909c, textColor: 'white' },
        { id: 'dec-linear-softmax', stack: 'decoder', name: 'Linear + Softmax Output', nameIgbo: 'Mmepụta Linear + Softmax', description: 'Converts decoder output to probabilities over the vocabulary.', descriptionIgbo: 'Ọwa linear ikpeazụ na-atụgharị mmepụta decoder n\'ogo okwu. Softmax na-atụgharị logits ndị a n\'ike n\'elu okwu.', position: [4, 8, 0], color: 0xec4899, textColor: 'white' }
    ];

    const container = document.getElementById('transformer-canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a18);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Background Stars
    const starCount = 3000;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 100;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Grid
    const grid = new THREE.GridHelper(100, 100, 0x1e293b, 0x1e293b);
    grid.position.y = -6;
    grid.material.opacity = 0.1;
    grid.material.transparent = true;
    scene.add(grid);

    // Lights
    scene.add(new THREE.AmbientLight(0x4488ff, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    function createBlockTexture(d, isTextOnly = false) {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 1024 * (1.2 / 4.5);
        const ctx = canvas.getContext('2d');

        const color = '#' + d.color.toString(16).padStart(6, '0');
        const textColor = d.textColor === 'dark' ? '#0f172a' : '#ffffff';

        if (!isTextOnly) {
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = textColor;
            ctx.lineWidth = 2;
            if (d.name.includes('Attention')) {
                for(let i=0; i<3; i++) ctx.strokeRect(100 + i*40, 180 + i*10, 150, 40);
            } else if (d.name.includes('Norm')) {
                ctx.beginPath(); ctx.arc(canvas.width - 100, 200, 40, 0, Math.PI*2); ctx.stroke();
                ctx.font = 'bold 40px monospace';
                ctx.fillText("+", canvas.width - 100, 215);
            } else if (d.name.includes('Forward')) {
                ctx.strokeRect(100, 200, 100, 40);
                ctx.strokeRect(250, 200, 100, 40);
                ctx.strokeRect(400, 200, 100, 40);
            }
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.fillStyle = textColor;
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0,0,0,1)';
            ctx.shadowOffsetX = 6;
            ctx.shadowOffsetY = 6;

            // Fit Header Text
            let fontSize = 64;
            ctx.font = `900 ${fontSize}px "Segoe UI", Roboto, Arial, sans-serif`;
            while (ctx.measureText(d.name.toUpperCase()).width > 950 && fontSize > 30) {
                fontSize -= 2;
                ctx.font = `900 ${fontSize}px "Segoe UI", Roboto, Arial, sans-serif`;
            }
            ctx.lineWidth = 14;
            ctx.strokeStyle = 'rgba(0,0,0,0.9)';
            ctx.strokeText(d.name.toUpperCase(), canvas.width / 2, 75);
            ctx.fillText(d.name.toUpperCase(), canvas.width / 2, 75);

            // Description
            ctx.font = '900 36px "Segoe UI", Roboto, Arial, sans-serif';
            ctx.lineWidth = 8;
            const wrapText = (text, x, y, maxWidth, lineHeight) => {
                const words = text.split(' ');
                let line = '';
                let currentY = y;
                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                        ctx.strokeText(line, x, currentY);
                        ctx.fillText(line, x, currentY);
                        line = words[n] + ' ';
                        currentY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                ctx.strokeText(line, x, currentY);
                ctx.fillText(line, x, currentY);
            };
            wrapText(d.description, canvas.width / 2, 135, 940, 44);
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return texture;
    }

    // Blocks
    const blocks = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    DATA.forEach((d, i) => {
        const group = new THREE.Group();
        group.position.set(...d.position);
        
        // 1. Base Block (Opaque)
        const blockTexture = createBlockTexture(d, false);
        const geometry = new THREE.BoxGeometry(4.5, 1.2, 1);

        const sideMat = new THREE.MeshStandardMaterial({ color: d.color, roughness: 0.4, metalness: 0.1 });
        const faceMat = new THREE.MeshStandardMaterial({
            map: blockTexture,
            roughness: 0.3,
            metalness: 0.2,
            emissive: d.color,
            emissiveIntensity: 0.1
        });

        const mesh = new THREE.Mesh(geometry, [sideMat, sideMat, sideMat, sideMat, faceMat, faceMat]);
        mesh.userData = d;
        group.add(mesh);

        // 2. "In Front" Labels (Front & Back)
        const labelTexture = createBlockTexture(d, true);
        const labelGeometry = new THREE.PlaneGeometry(4.4, 1.1); // Slightly smaller to avoid edges
        const labelMaterial = new THREE.MeshBasicMaterial({
            map: labelTexture,
            transparent: true,
            opacity: 1,
            depthTest: true,
            depthWrite: false, // Don't block things behind it, let depthTest handle it
            side: THREE.FrontSide
        });

        const frontLabel = new THREE.Mesh(labelGeometry, labelMaterial);
        frontLabel.position.z = 0.51;
        group.add(frontLabel);

        const backLabel = new THREE.Mesh(labelGeometry, labelMaterial);
        backLabel.position.z = -0.51;
        backLabel.rotation.y = Math.PI;
        group.add(backLabel);
        
        scene.add(group);
        blocks.push(mesh);
    });

    // Stack Highlights (Rims)
    function createStackRim(stack, color) {
        const stackBlocks = blocks.filter(b => b.userData.stack === stack);
        if (stackBlocks.length === 0) return;

        const box = new THREE.Box3();
        stackBlocks.forEach(b => {
            const bBox = new THREE.Box3().setFromObject(b);
            box.union(bBox);
        });

        // Expand slightly to avoid Z-fighting and provide a "rim" look
        box.expandByScalar(0.2);

        const size = new THREE.Vector3();
        box.getSize(size);
        const center = new THREE.Vector3();
        box.getCenter(center);

        const geometry = new THREE.BoxGeometry(size.x, size.y, size.z);
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5, linewidth: 2 }));
        line.position.copy(center);
        scene.add(line);
    }

    createStackRim('encoder', 0x00b4ff); // Deep Electric Blue
    createStackRim('decoder', 0x00e676); // Vibrant Emerald Green

    // Selection Glow
    const glowGeometry = new THREE.BoxGeometry(4.7, 1.4, 1.2);
    const glowMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 2,
        transparent: true,
        opacity: 0
    });
    const selectedGlow = new THREE.Mesh(glowGeometry, glowMaterial);
    selectedGlow.userData = { targetBlock: null };
    scene.add(selectedGlow);

    const infoPanel = document.getElementById('info-panel');
    const compNameEn = document.getElementById('comp-name-en');
    const compNameIg = document.getElementById('comp-name-ig');
    const compDescEn = document.getElementById('comp-desc-en');
    const panelHeader = document.getElementById('panel-header');
    const statusDot = document.getElementById('status-dot');
    const drillDownBtn = document.getElementById('drill-down-btn');

    function hexToRgb(hex) {
        return {
            r: (hex >> 16) & 255,
            g: (hex >> 8) & 255,
            b: hex & 255
        };
    }

    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    function darken(hex, amount) {
        const rgb = hexToRgb(hex);
        return rgbToHex(
            Math.max(0, Math.floor(rgb.r * (1 - amount))),
            Math.max(0, Math.floor(rgb.g * (1 - amount))),
            Math.max(0, Math.floor(rgb.b * (1 - amount)))
        );
    }

    container.addEventListener('click', (event) => {
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(blocks);

        if (intersects.length > 0) {
            const data = intersects[0].object.userData;
            compNameEn.textContent = data.name;
            compNameIg.textContent = data.nameIgbo;
            compDescEn.textContent = data.description;
            compDescIg.textContent = data.descriptionIgbo;
            
            // Dynamic Colors
            const baseColor = data.color;
            const hexColor = '#' + baseColor.toString(16).padStart(6, '0');
            const darkColor = darken(baseColor, 0.9);
            const midColor = darken(baseColor, 0.82);

            panelHeader.style.background = `linear-gradient(to bottom, ${darkColor}, ${midColor})`;
            panelHeader.style.borderBottom = `1px solid ${hexColor}22`;
            
            statusDot.style.backgroundColor = hexColor;
            statusDot.style.boxShadow = `0 0 20px ${hexColor}`;

            drillDownBtn.style.background = `linear-gradient(to bottom, ${darken(baseColor, 0.85)}, ${darken(baseColor, 0.9)})`;
            drillDownBtn.style.borderColor = `${hexColor}44`;
            drillDownBtn.style.color = hexColor;

            infoPanel.classList.remove('hidden');
            
            // Highlight selected block
            blocks.forEach(b => {
                b.material.emissiveIntensity = 0.1;
            });
            const obj = intersects[0].object;
            obj.material.emissiveIntensity = 1.0;

            // Update Glow Mesh
            selectedGlow.userData.targetBlock = obj;
            selectedGlow.material.color.setHex(obj.userData.color);
            selectedGlow.material.emissive.setHex(obj.userData.color);
            selectedGlow.material.opacity = 0.4;
        } else {
            infoPanel.classList.add('hidden');
            blocks.forEach(b => {
                b.material.emissiveIntensity = 0.1;
            });
            selectedGlow.userData.targetBlock = null;
            selectedGlow.material.opacity = 0;
        }
    });

    document.getElementById('close-info').onclick = () => infoPanel.classList.add('hidden');

    function animate(t) {
        requestAnimationFrame(animate);
        stars.rotation.y = t * 0.00005;
        blocks.forEach((b, i) => {
            const offset = Math.sin(t * 0.002 + b.userData.position[1]) * 0.1;
            b.position.y = offset;
        });

        if (selectedGlow.userData.targetBlock) {
            const target = selectedGlow.userData.targetBlock;
            // The block is inside a group, we want the world position including the group's bobbing
            const worldPos = new THREE.Vector3();
            target.getWorldPosition(worldPos);
            selectedGlow.position.copy(worldPos);
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate(0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<style>
    #navbar { background: rgba(2, 6, 23, 0.5) !important; backdrop-filter: blur(8px); }
    body { overflow: hidden !important; background-color: #050a18 !important; }
    #transformer-tour-container { background-color: #050a18 !important; }
</style>
{% endblock %}
