{% extends "base.html" %}
{% block title %}Transformer 3D Tour - NAIRA{% endblock %}
{% block content %}
<div id="transformer-tour-container" class="w-full h-screen bg-[#050a18] relative">
    <div id="transformer-canvas-container" class="w-full h-full"></div>
    
    <!-- Description Labels Container -->
    <div id="labels-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <div class="absolute top-6 left-6 pointer-events-none z-10">
        <h1 class="text-sm font-bold tracking-widest text-purple-400 uppercase">Transformer 3D Tour</h1>
        <h2 id="arch-name" class="text-2xl font-bold text-white">Original Transformer (2017)</h2>
    </div>

    <div id="info-panel" class="hidden fixed top-20 right-6 w-[420px] bg-[#0a0f1a] border border-slate-800/40 rounded-[32px] shadow-[0_24px_64px_rgba(0,0,0,0.6)] overflow-hidden z-50">
        <!-- Dynamic Header -->
        <div id="panel-header" class="px-8 py-6 flex items-center justify-between border-b transition-all duration-700">
            <div class="flex items-center gap-4">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full transition-all duration-700"></div>
                <div>
                    <h2 id="comp-name-en" class="text-white font-bold text-xl tracking-tight leading-none mb-1.5"></h2>
                    <p id="comp-name-ig" class="text-slate-400 text-xs font-semibold uppercase tracking-wider opacity-80"></p>
                </div>
            </div>
            <button id="close-info" class="text-slate-500 hover:text-white transition-all hover:rotate-90 duration-300 p-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="p-8 space-y-10">
            <!-- English Section -->
            <div class="space-y-4">
                <div class="flex items-center gap-2.5 text-[#38bdf8] text-[11px] font-black tracking-[0.2em] uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    ENGLISH
                </div>
                <p id="comp-desc-en" class="text-white leading-relaxed text-[16px] font-medium tracking-wide"></p>
            </div>
        </div>

        <!-- Drill Down Button -->
        <div class="px-8 pb-8">
            <button id="drill-down-btn" class="w-full transition-all text-white font-bold py-5 rounded-[24px] flex items-center justify-center gap-3 shadow-2xl active:scale-[0.97] border tracking-wide">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                Drill Down — See Internals
            </button>
        </div>
    </div>

    <div class="absolute bottom-6 left-6 text-[10px] text-slate-500 uppercase tracking-widest z-10">
        Click blocks to explore · Drag to rotate · Scroll to zoom
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const DATA = [
        { id: 'enc-input-embedding', name: 'Input Embedding', nameIgbo: 'Mtinyere Ihe Ntinye', description: 'Converts input tokens into dense vectors of d_model dimensions.', descriptionIgbo: 'Ọ na-atụgharị mkpụrụokwu ntinye ka ọ bụrụ vectors dị arọ nke akụkụ d_model.', position: [0, -4, 0], color: 0x6366f1 },
        { id: 'enc-pos-encoding', name: 'Positional Encoding', nameIgbo: 'Ntinye Ọnọdụ', description: 'Adds information about the relative or absolute position of the tokens.', descriptionIgbo: 'Na-agbakwunye ozi gbasara ọnọdụ ikwu ma ọ bụ zuru oke nke akara ndị ahụ.', position: [0, -2.8, 0], color: 0xa855f7 },
        { id: 'enc-mha', name: 'Multi-Head Attention', nameIgbo: 'Nleba anya nwere ọtụtụ isi', description: 'Allows the model to jointly attend to information from different representation subspaces.', descriptionIgbo: 'Na-enye ohere ka ihe nlereanya ahụ lekọta ozi sitere na subspaces nnọchite anya dịiche iche.', position: [0, -1.2, 0], color: 0x3b82f6 },
        { id: 'enc-add-norm', name: 'Add & Norm', nameIgbo: 'Tinye & Hazie', description: 'Residual connection followed by layer normalization.', descriptionIgbo: 'Njikọ residual na-esochi ya site na nhazi oyi akwa.', position: [0, 0.4, 0], color: 0x10b981 },
        { id: 'enc-ffn', name: 'Feed Forward', nameIgbo: 'Nye n\'ihu', description: 'Point-wise fully connected layers applied to each position identically.', descriptionIgbo: 'Ihe mkpuchi ejikọtara nke ọma na-emetụta ọnọdụ ọ bụla n\'otu aka ahụ.', position: [0, 2.0, 0], color: 0xf97316 },
        { id: 'out-linear-softmax', name: 'Linear + Softmax Output', nameIgbo: 'Mmepụta Linear + Softmax', description: 'The final linear layer projects the decoder output to the vocabulary size (e.g., 30,000 dimensions). Softmax converts these logits to probabilities over the vocabulary. The token with the highest probability is selected as the next output token.', descriptionIgbo: 'Ọwa linear ikpeazụ na-atụgharị mmepụta decoder n\'ogo okwu (dịka ọkwa 30,000). Softmax na-atụgharị logits ndị a n\'ike n\'elu okwu. A na-ahọrọ akara nke nwere ike kachasị dị elu dị ka akara mmepụta ọzọ.', position: [5, 0.4, 0], color: 0xec4899 }
    ];

    const container = document.getElementById('transformer-canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a18);
    
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Background Stars
    const starCount = 3000;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 100;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Grid
    const grid = new THREE.GridHelper(100, 100, 0x1e293b, 0x1e293b);
    grid.position.y = -6;
    grid.material.opacity = 0.1;
    grid.material.transparent = true;
    scene.add(grid);

    // Lights
    scene.add(new THREE.AmbientLight(0x4488ff, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    // Blocks
    const blocks = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const labelsContainer = document.getElementById('labels-container');
    const labelElements = [];

    DATA.forEach((d, i) => {
        const group = new THREE.Group();
        group.position.set(...d.position);
        
        const geometry = new THREE.BoxGeometry(3, 0.8, 1);
        const material = new THREE.MeshPhongMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.4, transparent: true, opacity: 0.9 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData = d;
        group.add(mesh);
        
        // Create HTML Label
        const label = document.createElement('div');
        label.className = 'absolute pointer-events-none text-center transform -translate-x-1/2 -translate-y-full mb-4';
        label.style.width = '200px';
        label.innerHTML = `
            <div class="text-white font-bold text-xs mb-0.5" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">${d.name}</div>
            <div class="text-slate-400 text-[9px] leading-tight px-2 line-clamp-2">${d.description.split('.')[0]}</div>
        `;
        labelsContainer.appendChild(label);
        
        // Offset labels alternately to reduce overlap
        const xOffset = (i % 2 === 0) ? -2.5 : 2.5;
        labelElements.push({ element: label, position: new THREE.Vector3(...d.position).add(new THREE.Vector3(xOffset, 0.6, 0)) });
        
        scene.add(group);
        blocks.push(mesh);
    });

    const infoPanel = document.getElementById('info-panel');
    const compNameEn = document.getElementById('comp-name-en');
    const compNameIg = document.getElementById('comp-name-ig');
    const compDescEn = document.getElementById('comp-desc-en');
    const panelHeader = document.getElementById('panel-header');
    const statusDot = document.getElementById('status-dot');
    const drillDownBtn = document.getElementById('drill-down-btn');

    function hexToRgb(hex) {
        return {
            r: (hex >> 16) & 255,
            g: (hex >> 8) & 255,
            b: hex & 255
        };
    }

    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    function darken(hex, amount) {
        const rgb = hexToRgb(hex);
        return rgbToHex(
            Math.max(0, Math.floor(rgb.r * (1 - amount))),
            Math.max(0, Math.floor(rgb.g * (1 - amount))),
            Math.max(0, Math.floor(rgb.b * (1 - amount)))
        );
    }

    container.addEventListener('click', (event) => {
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(blocks);

        if (intersects.length > 0) {
            const data = intersects[0].object.userData;
            compNameEn.textContent = data.name;
            compNameIg.textContent = data.nameIgbo;
            compDescEn.textContent = data.description;
            
            // Dynamic Colors
            const baseColor = data.color;
            const hexColor = '#' + baseColor.toString(16).padStart(6, '0');
            const darkColor = darken(baseColor, 0.9);
            const midColor = darken(baseColor, 0.82);

            panelHeader.style.background = `linear-gradient(to bottom, ${darkColor}, ${midColor})`;
            panelHeader.style.borderBottom = `1px solid ${hexColor}22`;
            
            statusDot.style.backgroundColor = hexColor;
            statusDot.style.boxShadow = `0 0 20px ${hexColor}`;

            drillDownBtn.style.background = `linear-gradient(to bottom, ${darken(baseColor, 0.85)}, ${darken(baseColor, 0.9)})`;
            drillDownBtn.style.borderColor = `${hexColor}44`;
            drillDownBtn.style.color = hexColor;

            infoPanel.classList.remove('hidden');
            
            // Highlight selected block
            blocks.forEach(b => b.material.emissiveIntensity = 0.4);
            intersects[0].object.material.emissiveIntensity = 1.5;
        } else {
            infoPanel.classList.add('hidden');
            blocks.forEach(b => b.material.emissiveIntensity = 0.4);
        }
    });

    document.getElementById('close-info').onclick = () => infoPanel.classList.add('hidden');

    function updateLabels() {
        labelElements.forEach(l => {
            const pos = l.position.clone();
            // Project 3D position to 2D screen coordinates
            pos.project(camera);

            const x = (pos.x + 1) * container.clientWidth / 2;
            const y = (-pos.y + 1) * container.clientHeight / 2;

            l.element.style.left = `${x}px`;
            l.element.style.top = `${y}px`;

            // Hide if behind camera or too close/far
            const dist = camera.position.distanceTo(l.position);
            
            // Logic to prevent overlap: hide labels that are too close to each other in 2D space?
            // Simple approach: fade out based on distance and projection depth
            if (pos.z > 1) {
                l.element.style.display = 'none';
            } else {
                l.element.style.display = 'block';
                // Adjust scale and opacity based on distance to reduce visual clutter
                const scale = Math.max(0.5, 1.2 - dist / 20);
                l.element.style.transform = `translate(-50%, -100%) scale(${scale})`;
                l.element.style.opacity = Math.max(0, 1 - (dist - 5) / 25);
            }
        });
    }

    function animate(t) {
        requestAnimationFrame(animate);
        stars.rotation.y = t * 0.00005;
        blocks.forEach((b, i) => {
            const offset = Math.sin(t * 0.002 + b.userData.position[1]) * 0.1;
            b.position.y = offset;
            
            // Also update label target position if block moves
            const xOffset = (i % 2 === 0) ? -2.5 : 2.5;
            labelElements[i].position.x = b.userData.position[0] + xOffset;
            labelElements[i].position.y = b.userData.position[1] + 0.6 + offset;
        });
        controls.update();
        updateLabels();
        renderer.render(scene, camera);
    }
    animate(0);

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>

<style>
    #navbar { background: rgba(2, 6, 23, 0.5) !important; backdrop-filter: blur(8px); }
    body { overflow: hidden; }

    /* Specific overrides for Transformer Tour to counter global page-sub styles */
    #info-panel #comp-name-en,
    #info-panel #comp-desc-en {
        color: #ffffff !important;
    }

    #info-panel #comp-name-ig {
        color: #94a3b8 !important;
    }

    #labels-container .text-white {
        color: #ffffff !important;
    }

    #labels-container .text-slate-400 {
        color: #94a3b8 !important;
    }
</style>
{% endblock %}
